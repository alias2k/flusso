[book]
title = "flusso"
description = "Keep OpenSearch in sync with Postgres, driven by declarative config."
language = "en"
src = "src"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/alias2k/flusso"
edit-url-template = "https://github.com/alias2k/flusso/edit/main/docs/{path}"
additional-css = []

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
