$schema: "http://json-schema.org/draft-07/schema#"
title: flusso Index Schema
type: object
required: [version, table, fields]
additionalProperties: false
properties:
  version:
    type: integer
    enum: [1]
  table:
    $ref: "#/definitions/pg_identifier"
  schema:
    $ref: "#/definitions/pg_identifier"
    default: public
  primary_key:
    $ref: "#/definitions/pg_identifier"
  doc_id:
    type: string
  soft_delete:
    oneOf:
      - type: object
        required: [field]
        additionalProperties: false
        properties:
          field:
            $ref: "#/definitions/field_name"
          when:
            $ref: "#/definitions/filters"
      - type: object
        required: [column]
        additionalProperties: false
        properties:
          column:
            $ref: "#/definitions/pg_identifier"
          when:
            $ref: "#/definitions/filters"
  fields:
    type: array
    items:
      $ref: "#/definitions/field"

definitions:
  pg_identifier:
    type: string
    pattern: "^[a-z_][a-z0-9_]*$"
    maxLength: 63

  field_name:
    type: string
    pattern: "^[a-zA-Z_][a-zA-Z0-9_]*$"
    maxLength: 63

  field:
    oneOf:
      - $ref: "#/definitions/field_name"
      # A group: `- group: name` with nested `fields` (a same-row sub-object).
      - type: object
        required: [group, fields]
        additionalProperties: false
        properties:
          group:
            $ref: "#/definitions/field_name"
          options:
            type: object
            additionalProperties: true
          fields:
            type: array
            items:
              $ref: "#/definitions/field"
      - type: object
        required: [field]
        additionalProperties: false
        properties:
          field:
            $ref: "#/definitions/field_name"
          column:
            $ref: "#/definitions/pg_identifier"
          type:
            $ref: "#/definitions/flusso_type"
          required:
            type: boolean
            description: >-
              Force the field non-null. Fields are nullable by default.
          options:
            type: object
            description: >-
              Extra OpenSearch mapping properties merged beside the derived
              type (e.g. analyzer, format, scaling_factor).
            additionalProperties: true
          kind:
            enum: [code, prose]
            description: >-
              Full-text shorthand for a text field: 'code' (flusso_code analyzer,
              for identifier-like short text) or 'prose' (flusso_text analyzer).
              Only valid on a scalar column field.
          join:
            $ref: "#/definitions/join"
          aggregate:
            $ref: "#/definitions/aggregate"
          transforms:
            $ref: "#/definitions/transforms"
          default: {}

  flusso_type:
    description: >-
      A scalar field's declared type. A named type bridges a Postgres column
      type and an OpenSearch mapping type; 'custom' carries an explicit
      OpenSearch type and the Postgres types it accepts.
    oneOf:
      - enum:
          [
            text,
            keyword,
            enum,
            uuid,
            boolean,
            short,
            integer,
            long,
            float,
            double,
            decimal,
            date,
            timestamp,
            binary,
            json,
          ]
      - type: object
        required: [custom]
        additionalProperties: false
        properties:
          custom:
            type: object
            required: [postgres, opensearch]
            additionalProperties: false
            properties:
              postgres:
                type: array
                items:
                  type: string
              opensearch:
                type: string

  transforms:
    type: array
    items:
      type: string
      enum: [lowercase, trim]

  filter:
    oneOf:
      - type: object
        required: [raw]
        additionalProperties: false
        properties:
          raw:
            type: string
      - type: object
        required: [column, op]
        additionalProperties: false
        properties:
          column:
            $ref: "#/definitions/pg_identifier"
          op:
            type: string
            enum: [is_null, is_not_null]
      - type: object
        required: [column, op]
        additionalProperties: false
        properties:
          column:
            $ref: "#/definitions/pg_identifier"
          op:
            type: string
            enum: [eq, neq, lt, lte, gt, gte, in, not_in, like, ilike, between]
          value: {}

  filters:
    type: array
    items:
      $ref: "#/definitions/filter"

  order_by:
    type: array
    items:
      type: object
      required: [column]
      additionalProperties: false
      properties:
        column:
          $ref: "#/definitions/pg_identifier"
        direction:
          type: string
          enum: [asc, desc]

  through:
    type: object
    required: [table, left_key, right_key]
    additionalProperties: false
    properties:
      table:
        $ref: "#/definitions/pg_identifier"
      left_key:
        $ref: "#/definitions/pg_identifier"
      right_key:
        $ref: "#/definitions/pg_identifier"

  join:
    type: object
    required: [table, type, primary_key, fields]
    additionalProperties: false
    properties:
      table:
        $ref: "#/definitions/pg_identifier"
      type:
        type: string
        enum: [one_to_one, one_to_many, many_to_many]
      primary_key:
        $ref: "#/definitions/pg_identifier"
        description: >-
          The related table's primary key. The projected field reading it is
          marked non-null automatically, just like the root primary_key.
      foreign_key:
        $ref: "#/definitions/pg_identifier"
      through:
        $ref: "#/definitions/through"
      filters:
        $ref: "#/definitions/filters"
      order_by:
        $ref: "#/definitions/order_by"
      limit:
        type: integer
        minimum: 1
      fields:
        type: array
        items:
          $ref: "#/definitions/field"
    if:
      properties:
        type:
          const: many_to_many
    then:
      required: [through]
    else:
      required: [foreign_key]

  aggregate:
    type: object
    required: [table, op]
    additionalProperties: false
    properties:
      table:
        $ref: "#/definitions/pg_identifier"
      op:
        type: string
        enum: [count, sum, avg, min, max]
      column:
        $ref: "#/definitions/pg_identifier"
      foreign_key:
        $ref: "#/definitions/pg_identifier"
      through:
        $ref: "#/definitions/through"
      filters:
        $ref: "#/definitions/filters"
