name: Roadmap status
description: >
  Add an issue or PR to the org roadmap Project (idempotent) and set its Status
  single-select field to a named option. First-party wrapper over the Projects v2
  GraphQL API, so there is no third-party Project action in the supply chain.

inputs:
  token:
    description: PAT with org Projects read/write (default GITHUB_TOKEN can't write org Projects v2).
    required: true
  owner:
    description: Organization login that owns the Project.
    required: true
  project-number:
    description: The Project v2 number (the integer in its URL).
    required: true
  content-id:
    description: >
      One or more node IDs (whitespace-separated) of the issues/PRs to place on the
      board. Each is added and set to the same status.
    required: true
  status:
    description: Name of the Status option to set (e.g. "Todo", "In Progress", "Done", "Released").
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        OWNER: ${{ inputs.owner }}
        NUMBER: ${{ inputs.project-number }}
        CONTENT_ID: ${{ inputs.content-id }}
        STATUS: ${{ inputs.status }}
      run: |
        set -euo pipefail

        # 1. Resolve the project node id, the Status field id, and the option id
        #    for the requested status name — all by name/number, nothing hardcoded.
        read -r PROJECT_ID FIELD_ID OPTION_ID < <(
          gh api graphql -f owner="$OWNER" -F number="$NUMBER" -f status="$STATUS" -f query='
            query($owner:String!, $number:Int!) {
              organization(login:$owner) {
                projectV2(number:$number) {
                  id
                  field(name:"Status") {
                    ... on ProjectV2SingleSelectField { id options { id name } }
                  }
                }
              }
            }' --jq '
              .data.organization.projectV2 as $p
              | $p.field.options[] | select(.name == env.status) | .id as $opt
              | "\($p.id) \($p.field.id) \($opt)"
            '
        )

        if [ -z "${OPTION_ID:-}" ]; then
          echo "::error::No Status option named \"$STATUS\" on project #$NUMBER (owner $OWNER)."
          exit 1
        fi

        for content in $CONTENT_ID; do
          # 2. Add the content to the project. addProjectV2ItemById is idempotent:
          #    it returns the existing item id if the issue/PR is already on the board.
          ITEM_ID=$(gh api graphql -f projectId="$PROJECT_ID" -f contentId="$content" -f query='
            mutation($projectId:ID!, $contentId:ID!) {
              addProjectV2ItemById(input:{projectId:$projectId, contentId:$contentId}) {
                item { id }
              }
            }' --jq '.data.addProjectV2ItemById.item.id')

          # 3. Set the Status field on that item.
          gh api graphql -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$FIELD_ID" -f optionId="$OPTION_ID" -f query='
            mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
              updateProjectV2ItemFieldValue(input:{
                projectId:$projectId, itemId:$itemId, fieldId:$fieldId,
                value:{ singleSelectOptionId:$optionId }
              }) { projectV2Item { id } }
            }' >/dev/null

          echo "Set status \"$STATUS\" on item $ITEM_ID (content $content, project #$NUMBER)."
        done
