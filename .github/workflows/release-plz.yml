name: release-plz

# release-plz drives crates.io. Split into two jobs so only the publish step is
# gated behind the `release` environment:
#   * release-pr — opens/updates the "release" PR (version bumps + CHANGELOG) on
#     every push to main. Ungated; no registry token needed.
#   * release    — on push to main, publishes any crate whose version isn't yet
#     on crates.io (i.e. right after the release PR merges), then pushes
#     per-crate tags incl. `flusso-cli-v<version>`. Runs in the `release`
#     environment, so its `CARGO_REGISTRY_TOKEN` lives there and any environment
#     protection rules (e.g. required reviewers) gate the publish.
#
# Skipping a publish: the `release` job is skipped when the head commit message
# contains `[skip release]`, so you can push ordinary changes to main without
# publishing. (release-plz only publishes crates whose version isn't already on
# crates.io, so a push without a version bump publishes nothing regardless — the
# marker is the explicit, belt-and-braces opt-out.)
#
# Both jobs authenticate as a GitHub App (via actions/create-github-app-token)
# rather than the default GITHUB_TOKEN. This is required so that the commits/tags
# release-plz pushes DO trigger downstream workflows — pushes made with the
# default GITHUB_TOKEN are suppressed by GitHub to avoid recursive runs, which
# otherwise stops the release PR from getting CI and the `flusso-cli-v*` tag from
# firing docker.yml. Setup: create a GitHub App (contents + pull-requests: write),
# install it on this repo, then set repo variable RELEASE_PLZ_APP_ID and repo
# secret RELEASE_PLZ_APP_PRIVATE_KEY. See https://release-plz.dev/docs/github/token.

on:
  push:
    branches: [main]

# Never run two release jobs concurrently — they both touch tags/releases.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-pr:
    name: release-pr
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Open/update release PR
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  release:
    name: release
    runs-on: ubuntu-latest
    # Skip publishing when the head commit opts out with `[skip release]`.
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    # Gate the crates.io publish behind the release environment (this is where
    # CARGO_REGISTRY_TOKEN lives, and where approval/branch rules apply).
    environment: release
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish unpublished crates
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
