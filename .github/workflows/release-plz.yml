name: release-plz

# release-plz drives crates.io: on every push to main it opens/updates a
# "release" PR (version bumps + CHANGELOG). Merging that PR publishes every
# crate to crates.io in dependency order and pushes per-crate git tags
# (e.g. `flusso-cli-v0.1.0`). The docker + dist release workflows trigger off
# the `flusso-cli-v*` tag to build the image and the prebuilt binaries.
#
# Requires the `CARGO_REGISTRY_TOKEN` repository secret (a crates.io API token).
#
# NOTE: the release PR is opened with the default GITHUB_TOKEN, so pushes from
# it do NOT trigger the CI workflow (GitHub suppresses Actions-on-Actions). If
# you want CI to run on the release PR, swap GITHUB_TOKEN for a fine-grained PAT
# or the release-plz GitHub App token. See https://release-plz.dev/docs/github.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Never run two release jobs concurrently — they both touch tags/releases.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # rust-toolchain.toml is honored automatically.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
