name: release-plz

# release-plz drives crates.io. Split into two jobs so only the publish step is
# gated behind the `release` environment:
#   * release-pr — opens/updates the "release" PR (version bumps + CHANGELOG) on
#     every push to main. Ungated; no registry token needed.
#   * release    — on push to main, publishes the crates carried by a merged
#     release PR, then pushes per-crate tags incl. `flusso-cli-v<version>`. Runs
#     in the `release` environment, so its `CARGO_REGISTRY_TOKEN` lives there and
#     any environment protection rules (e.g. required reviewers) gate the publish.
#
# Publishing is gated on the release-PR merge, not on every push:
# `release_always = false` in release-plz.toml makes the `release` command a
# no-op unless the head commit is a merged `release-plz-*` PR. So ordinary
# feature pushes publish nothing, and — crucially — a brand-new crate can't be
# published on its feature merge ahead of the version bump + CHANGELOG the
# release PR carries (the #77 race: a new crate's version is unpublished by
# definition, so the old "no bump -> publishes nothing" assumption didn't hold
# for it). The version bump therefore always lands before any publish.
#
# Both jobs authenticate as a GitHub App (via actions/create-github-app-token)
# rather than the default GITHUB_TOKEN. This is required so that the commits/tags
# release-plz pushes DO trigger downstream workflows — pushes made with the
# default GITHUB_TOKEN are suppressed by GitHub to avoid recursive runs, which
# otherwise stops the release PR from getting CI and the `flusso-cli-v*` tag from
# firing docker.yml. Setup: create a GitHub App (contents + pull-requests: write),
# install it on this repo, then set repo variable RELEASE_PLZ_APP_ID and repo
# secret RELEASE_PLZ_APP_PRIVATE_KEY. See https://release-plz.dev/docs/github/token.

on:
  push:
    branches: [main]

# Never run two release jobs concurrently — they both touch tags/releases.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-pr:
    name: release-pr
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Open/update release PR
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  release:
    name: release
    runs-on: ubuntu-latest
    # No push-level guard: `release_always = false` (release-plz.toml) already
    # makes this a no-op on anything but a merged `release-plz-*` release PR.
    # Gate the crates.io publish behind the release environment (this is where
    # CARGO_REGISTRY_TOKEN lives, and where approval/branch rules apply).
    environment: release
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish unpublished crates
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
