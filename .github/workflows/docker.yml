name: docker

# Builds the registry-ready `runtime` image from the Dockerfile and pushes it to
# both GitHub Container Registry (ghcr.io) and Docker Hub (docker.io). Triggers on
# the CLI's release tag (`flusso-cli-v*`, created by release-plz) and can be run
# manually.
#
# Each platform builds on its own native runner (amd64 + arm64), pushes by digest,
# then a merge job assembles one multi-arch manifest list per registry. Native
# arm64 avoids QEMU emulation (~75min → ~10min); see issue #33.

on:
  push:
    tags: ['flusso-cli-v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Docker Hub target — the alias2k org namespace (not the login username).
  DOCKERHUB_IMAGE: docker.io/alias2k/flusso

jobs:
  prepare:
    name: derive version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      # Strip the `flusso-cli-v` tag prefix to get a clean semver (e.g. 0.1.0).
      # On manual dispatch (no tag) fall back to a `dev` tag.
      - name: Derive version
        id: ver
        run: |
          ref="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${ref#flusso-cli-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: build & push (${{ matrix.platform }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    # Same release gate as the crates.io publish; gates the digest push.
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Filesystem-safe form of the platform (linux/amd64 → linux-amd64) for the
      # per-platform cache scope and digest artifact name.
      - name: Prepare platform slug
        run: echo "PLATFORM_SLUG=${PLATFORM//\//-}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Personal access token of an alias2k org member with write access; namespace
      # is the org (DOCKERHUB_IMAGE below), not the login username.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata (OCI labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKERHUB_IMAGE }}

      - name: Build and push by digest (runtime target)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            REVISION=${{ github.sha }}
          # Digest-only push (no tags yet) to both registries; the merge job
          # assembles the tagged manifest list from these digests.
          outputs: type=image,"name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},${{ env.DOCKERHUB_IMAGE }}",push-by-digest=true,name-canonical=true,push=true
          # Per-platform scope so the two halves stop clobbering each other in the
          # 10 GB gha cache.
          cache-from: type=gha,scope=build-${{ env.PLATFORM_SLUG }}
          cache-to: type=gha,mode=max,scope=build-${{ env.PLATFORM_SLUG }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_SLUG }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: merge manifest & push tags
    needs: [prepare, build]
    runs-on: ubuntu-latest
    # Same release gate; gates the tagged-manifest push.
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      # A manifest list is registry-local, so assemble one per registry from the
      # per-platform digests pushed by the build job. Tags are filtered per
      # registry from the metadata-action output.
      - name: Create and push manifest lists
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("${{ env.REGISTRY }}")) | "-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("docker.io")) | "-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.DOCKERHUB_IMAGE }}@sha256:%s ' *)

      - name: Inspect manifests
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}
          docker buildx imagetools inspect ${{ env.DOCKERHUB_IMAGE }}:${{ needs.prepare.outputs.version }}
