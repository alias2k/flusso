name: docker

# Builds the registry-ready `runtime` image from the Dockerfile and pushes it to
# GitHub Container Registry (ghcr.io). Triggers on the CLI's release tag
# (`flusso-cli-v*`, created by release-plz) and can be run manually.

on:
  push:
    tags: ['flusso-cli-v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: build & push image
    runs-on: ubuntu-latest
    # Same release gate as the crates.io publish, for approval parity.
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Strip the `flusso-cli-v` tag prefix to get a clean semver (e.g. 0.1.0).
      # On manual dispatch (no tag) fall back to a `dev` tag.
      - name: Derive version
        id: ver
        run: |
          ref="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${ref#flusso-cli-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push (runtime target)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
            REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
