name: CI

on:
  push:
    branches: [main]
  pull_request:

# Newer pushes to the same ref supersede in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: clippy + tests
    runs-on: ubuntu-latest
    # GitHub-hosted ubuntu runners ship a running Docker daemon, which the
    # Postgres e2e tests (testcontainers) need.
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      # `--all-targets` is intentionally omitted from clippy: several test crates
      # use `.unwrap()`, which the workspace lints deny on non-test targets.
      - name: Clippy
        run: cargo clippy --workspace

      # Clippy (above, no `--all-targets`) and nextest only compile lib/bin and
      # test targets — benches and examples are built by neither, so a broken one
      # would slip through. A plain `cargo check --all-targets` compiles them too;
      # it's rustc (not clippy), so the `unwrap_used` clippy lint doesn't fire on
      # the test/bench `.unwrap()`s.
      - name: Check all targets (benches, examples)
        run: cargo check --workspace --all-targets

      # The Docker runtime image builds the CLI without the designer; make sure
      # that server-only configuration keeps compiling.
      - name: Check server-only build (no designer)
        run: cargo check -p flusso-cli --no-default-features

      # `--run-ignored all` includes the `#[ignore]`d container-backed e2e
      # tests; the `ci` profile gives them retries and a longer timeout. The
      # `query.rs` proptests are ordinary `#[test]`s, so they run here too.
      - name: Test (unit + integration + e2e)
        run: cargo nextest run --profile ci --workspace --run-ignored all

      # nextest does not run doctests; run them separately.
      - name: Doctests
        run: cargo test --workspace --doc

      # The crate docs are a living reference (lots of intra-doc `[`links`]`), so
      # gate on them resolving: `-D warnings` turns a broken/ambiguous/redundant
      # link into a build error. `--document-private-items` checks internal docs
      # too, since much of the documentation is on private items.
      - name: Doc links
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --document-private-items

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

  fuzz:
    name: fuzz (pgoutput decoder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # cargo-fuzz needs nightly (sanitizer/coverage instrumentation). The
      # repo's rust-toolchain.toml pins stable; the explicit `+nightly` below
      # overrides it just for the fuzz invocation.
      #
      # Pinned to a dated nightly, not floating `@nightly`: the 2026-07-23
      # nightly ICEs in codegen when building tokio under ASan
      # (rustc_codegen_ssa operand.rs "not immediate"), which broke this job on
      # every run with no code change. Bump this date once a later nightly is
      # confirmed to compile the fuzz target again.
      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-22

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: libs/1-sources/1-postgres/fuzz

      # A time-boxed smoke run, not an exhaustive campaign: a regression that
      # makes the decoder panic on malformed bytes fails CI here. A crash is
      # written to fuzz/artifacts/ and uploaded below for reproduction.
      #
      # `--target` is pinned to the gnu host on purpose. cargo-fuzz defaults the
      # fuzz target to the triple it was *itself* built for (`current_platform`),
      # and the prebuilt binary `taiki-e/install-action` fetches is a static musl
      # build — so without this it tries to fuzz for `x86_64-unknown-linux-musl`,
      # which isn't installed and whose static crt is incompatible with the ASan
      # the fuzzer needs ("sanitizer is incompatible with statically linked libc").
      - name: Fuzz pgoutput decoder (60s)
        working-directory: libs/1-sources/1-postgres
        run: cargo +nightly-2026-07-22 fuzz run pgoutput_decode --target x86_64-unknown-linux-gnu -- -max_total_time=60

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: libs/1-sources/1-postgres/fuzz/artifacts/
          if-no-files-found: ignore

  designer-frontend:
    name: designer SPA (build + no drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/design/frontend/package-lock.json

      - name: Install deps
        working-directory: apps/design/frontend
        run: npm ci

      - name: Format check
        working-directory: apps/design/frontend
        run: npm run format:check

      - name: Lint
        working-directory: apps/design/frontend
        run: npm run lint -- --max-warnings 0

      # Every `t("…")` string the UI uses must have a key in the English base
      # catalog, and every locale must define the same key set — so a new feature
      # can't ship UI without its translations. See scripts/check-i18n.mjs.
      - name: Check translations are complete
        working-directory: apps/design/frontend
        run: npm run check:i18n

      # The built SPA is committed to `apps/design/dist/` so the Rust crate
      # (rust-embed) builds with no Node toolchain. Rebuild it from source and
      # fail if it drifts from what's committed — a reproducible `npm ci` + Vite
      # build yields identical (content-hashed) output for the same source.
      - name: Build the SPA
        working-directory: apps/design/frontend
        run: npm run build

      - name: Check the committed dist is up to date
        run: |
          if ! git diff --quiet -- apps/design/dist; then
            echo "::error::apps/design/dist is stale — run 'npm --prefix apps/design/frontend ci && npm --prefix apps/design/frontend run build' and commit the result."
            git --no-pager diff --stat -- apps/design/dist
            exit 1
          fi
