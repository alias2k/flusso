# cargo-nextest configuration — https://nexte.st/docs/configuration/
#
# Why nextest here:
#   * Each test runs in its own process, so the env-var mutation in the
#     `schema` crate's config tests (libs/2-schema/tests/config_toml.rs) can't
#     race across tests.
#   * The container-backed e2e tests (Postgres via testcontainers, plus the
#     OpenSearch reindex/pipeline tests) get their own concurrency caps and
#     retries — container startup is occasionally flaky and legitimately slow.
#
# Note: nextest does not run doctests. Run those separately with
# `cargo test --doc` (there are none today, but don't let that change silently).

[profile.default]
# Flag a test that runs long, but don't kill it — spinning up a container is
# slow, and the per-test overrides below give the e2e tests real headroom.
slow-timeout = { period = "30s" }
retries = 0

# Postgres-backed e2e. Capping the thread count bounds how many Postgres
# containers come up at once instead of one per core.
[test-groups.docker]
max-threads = 8

# OpenSearch-backed e2e (the `reindex` and full-pipeline `pipeline` binaries).
# Each spins up a memory-hungry OpenSearch (a 512MB JVM heap), so they are
# serialized — running several at once starves the runner and the in-test
# poll deadlines blow. One OpenSearch container at a time.
[test-groups.opensearch]
max-threads = 1

# The Postgres e2e tests live in these integration-test binaries and are
# `#[ignore]`d by default (run with `--run-ignored all`). Put them in the
# `docker` group, retry transient failures, and allow a slow startup.
[[profile.default.overrides]]
filter = 'package(flusso-sources-postgres) & binary(integration) | package(flusso-engine) & binary(wal) | package(flusso-sources-postgres) & binary(config_coverage) | package(flusso-sources-postgres) & binary(publication)'
test-group = 'docker'
retries = 2
slow-timeout = { period = "90s", terminate-after = 4 }

# OpenSearch-backed e2e: serialized via the `opensearch` group, generous startup.
[[profile.default.overrides]]
filter = 'package(flusso-sinks-opensearch) & binary(reindex) | package(flusso-engine) & binary(pipeline)'
test-group = 'opensearch'
retries = 2
slow-timeout = { period = "120s", terminate-after = 5 }

# CI: don't stop at the first failure, and emit JUnit for the runner to surface.
[profile.ci]
retries = 0
fail-fast = false

[profile.ci.junit]
path = "junit.xml"

[[profile.ci.overrides]]
filter = 'package(flusso-sources-postgres) & binary(integration) | package(flusso-engine) & binary(wal) | package(flusso-sources-postgres) & binary(config_coverage) | package(flusso-sources-postgres) & binary(publication)'
test-group = 'docker'
retries = 2
slow-timeout = { period = "120s", terminate-after = 5 }

[[profile.ci.overrides]]
filter = 'package(flusso-sinks-opensearch) & binary(reindex) | package(flusso-engine) & binary(pipeline)'
test-group = 'opensearch'
retries = 2
slow-timeout = { period = "150s", terminate-after = 5 }
