# Default values for the flusso chart.

image:
  # Docker Hub is the primary registry; ghcr.io/alias2k/flusso is an equivalent mirror.
  repository: alias2k/flusso
  # Defaults to the chart's appVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# flusso consumes a SINGLE Postgres logical replication slot, so exactly one pod
# may run at a time. This is fixed at 1 and the chart fails if you raise it; the
# Deployment also uses the Recreate strategy so a new pod never overlaps the old
# one on the same slot during a rollout.
replicaCount: 1

# How flusso gets its configuration.
#   create: true  → render `flussoToml` (+ `schemas`) into a ConfigMap, mount it
#                   at `mountPath`, and run `--config <mountPath>/flusso.toml`.
#   create: false + existingConfigMap → mount that ConfigMap instead (it must
#                   contain flusso.toml and any referenced schema files).
#   create: false + no existingConfigMap → run nothing extra; the image must
#                   already carry a /app/flusso.lock (a custom/baked image).
# In the `--config` modes `run` recompiles the lock from the config on every
# start (cargo-style); the chart points it at a writable `lock-state` emptyDir,
# so the ConfigMap stays the source of truth and the lock there is ephemeral.
config:
  create: true
  existingConfigMap: ""
  mountPath: /config
  # The flusso.toml. Keep connection/sink URLs as `{ env = "VAR" }` references so
  # secrets are injected at run time (see `secrets` below), never baked into the
  # ConfigMap. Schema paths resolve relative to this file — i.e. against the keys
  # under `schemas`.
  flussoToml: |
    [source]
    type = "postgres"
    connection_url = { env = "DATABASE_URL" }

    [sinks.primary]
    type = "opensearch"
    url = { env = "PRIMARY_OPENSEARCH_URL" }

    # [[index]]
    # name = "users"
    # schema = "users.schema.yml"
  # filename -> contents, mounted alongside flusso.toml. Example:
  #   users.schema.yml: |
  #     root: public.users
  #     fields:
  #       - keyword: email
  schemas: {}

# `flusso run` flags. Each maps to a CLI arg (and now also a FLUSSO_* env var).
run:
  slot: flusso
  publication: flusso
  skipBackfill: false
  queueCapacity: 1024
  lagPollSecs: 15
  # Any extra raw args appended verbatim, e.g. ["--pretty"].
  extraArgs: []

# The operational HTTP surfaces.
http:
  # Public, read-only surface (health, readiness, status, metrics). Exposed via
  # the Service and scraped by Prometheus. Bound to 0.0.0.0 in the pod.
  port: 9464
  # Private control surface (indexes, reindex), Basic-auth protected. Bound to
  # localhost only — reach it with `kubectl port-forward` — so it is never
  # cluster-exposed by default. Set credentials via `secrets` below
  # (FLUSSO_ADMIN_USER / FLUSSO_ADMIN_PASSWORD); the defaults are admin/flusso
  # and the pod logs a warning until you change the password.
  privatePort: 9465

# Secrets injected as environment variables (resolved by `{ env = "VAR" }`
# references in the config). Use `create` to manage a Secret from `data`, or
# point at an `existingSecret` you manage yourself. Either way it is mounted
# with envFrom, so its keys become env vars (e.g. DATABASE_URL,
# PRIMARY_OPENSEARCH_URL, OS_PASSWORD).
secrets:
  create: false
  existingSecret: ""
  data: {}
    # DATABASE_URL: "postgres://user:pass@postgres:5432/app"
    # PRIMARY_OPENSEARCH_URL: "https://opensearch:9200"

# Extra plain environment variables (non-secret), e.g. RUST_LOG, OTEL_*.
env:
  RUST_LOG: info
# Extra envFrom sources (additional ConfigMaps/Secrets).
envFrom: []

service:
  type: ClusterIP
  port: 9464
  annotations: {}

# Prometheus Operator ServiceMonitor for the /metrics endpoint. Requires the
# Prometheus Operator CRDs. For plain Prometheus, scrape the Service/pod directly.
metrics:
  serviceMonitor:
    enabled: false
    # Namespace to create the ServiceMonitor in; defaults to the release namespace.
    namespace: ""
    interval: 30s
    scrapeTimeout: ""
    # Extra labels (e.g. to match your Prometheus `serviceMonitorSelector`).
    labels: {}
    relabelings: []
    metricRelabelings: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Probes hit the operational HTTP surface. Readiness flips to 200 once past startup.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 30

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
