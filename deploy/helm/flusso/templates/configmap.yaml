{{- if .Values.config.create }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-config" (include "flusso.fullname" .) }}
  labels:
    {{- include "flusso.labels" . | nindent 4 }}
data:
  flusso.toml: |
    {{- .Values.config.flussoToml | nindent 4 }}
  {{- range $name, $contents := .Values.config.schemas }}
  {{ $name }}: |
    {{- $contents | nindent 4 }}
  {{- end }}
{{- end }}
