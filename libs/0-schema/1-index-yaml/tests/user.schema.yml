# yaml-language-server: $schema=../../../../schemas/index.schema.yml

version: 1

# Root table
table: users
schema: public # optional, default "public"
primary_key: id # optional
doc_id: id # optional, defaults to primary_key

# Soft-delete: rows matching `when` are treated as deletes
soft_delete:
  field: archived
  when:
    - { column: "archived_at", op: is_null }

fields:
  # Short form: field name = column name, type defaults to `keyword`
  - id
  - email

  # Rename column → field, declared type
  - field: createdAt
    column: created_at
    type: timestamp
    required: false

  - field: handle
    column: email
    type: keyword
    required: false
    transforms:
      - lowercase
      - trim

  # Full-text, with an explicit analyzer via `options`
  - field: bio
    type: text
    required: false
    options: { analyzer: english }
    default: ""

  - field: displayName
    column: name
    type: keyword
    required: false
    transforms:
      - trim
    default: "anonymous"

  # Embedded object (one-to-one): shape is structural, no `type`. The related
  # table's `primary_key` makes its projected key column non-null automatically.
  - field: address
    join:
      table: addresses
      type: one_to_one
      foreign_key: user_id
      primary_key: id
      fields:
        - street
        - field: city
          required: false
          transforms:
            - trim
        - country

  # Nested array (one-to-many) with order_by + limit
  - field: orders
    join:
      table: orders
      type: one_to_many
      foreign_key: user_id
      primary_key: id
      order_by:
        - { column: created_at, direction: desc }
      limit: 5
      fields:
        - id
        - field: total
          type: double
          required: false
        - field: status
          type: keyword
          required: false

        # Nested deeper
        - field: items
          join:
            table: order_items
            type: one_to_many
            foreign_key: order_id
            primary_key: id
            fields:
              - id
              - sku
              - field: quantity
                type: integer
                required: false
              - field: price
                type: double
                required: false

  # Flat array via join table (many-to-many)
  - field: tags
    join:
      table: tags
      type: many_to_many
      through:
        table: user_tags
        left_key: user_id
        right_key: tag_id
      primary_key: id
      fields: [name]

  # `count` aggregates: result type is always `long`, so no `type` needed
  - field: tagCount
    aggregate:
      table: tags
      op: count
      through:
        table: user_tags
        left_key: user_id
        right_key: tag_id

  - field: totalOrders
    aggregate:
      table: orders
      foreign_key: user_id
      op: count

  - field: totalOrdersFulfilled
    aggregate:
      table: orders
      foreign_key: user_id
      op: count
      filters:
        - { column: "status", op: "eq", value: "fulfilled" }

  # `sum`/`min`/`max` mirror the column, so they declare a `type`
  - field: lifetimeValue
    type: double
    aggregate:
      table: orders
      foreign_key: user_id
      op: sum
      column: total
