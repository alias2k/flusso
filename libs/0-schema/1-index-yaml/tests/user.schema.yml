# yaml-language-server: $schema=../../../../schemas/index.schema.yml
# Fixture for the type-as-key field format: every field kind in one schema.
version: 1
table: users
primary_key: id

soft_delete:
  column: deleted

fields:
  - integer: id
    required: false
  - keyword: email
    required: true
    transforms: [lowercase, trim]
  - text: fullName
    column: full_name
    required: false
  - identifier: sku
    required: false

  # A geo point from two coordinate columns.
  - geo: location
    lat: latitude
    lon: longitude
    required: false

  # A custom scalar (explicit Postgres/OpenSearch pair).
  - custom: price
    postgres: [numeric]
    opensearch: scaled_float
    required: false
    options:
      scaling_factor: 100

  # A same-row sub-object.
  - object: account
    fields:
      - enum: tier
        required: true
      - timestamp: createdAt
        column: created_at
        required: true

  # One-to-one join.
  - one_to_one: profile
    table: profiles
    foreign_key: user_id
    primary_key: user_id
    fields:
      - text: bio
        required: false

  # One-to-many join with filters and ordering.
  - one_to_many: orders
    table: orders
    foreign_key: user_id
    primary_key: id
    filters:
      - { column: status, op: neq, value: cancelled }
    order_by:
      - { column: placed_at, direction: desc }
    fields:
      - enum: status
        required: true
      - decimal: total
        required: true

  # Aggregates.
  - count: orderCount
    table: orders
    foreign_key: user_id
  - sum: lifetimeValue
    table: orders
    column: total
    value_type: decimal
    foreign_key: user_id

  - constant: source
    value: flusso
