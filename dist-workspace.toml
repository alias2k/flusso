[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false
# release-plz owns the GitHub Release (it drives versioning, changelogs, and the
# crates.io publish). dist only uploads its artifacts onto that existing release;
# it must not try to create it, or it conflicts with release-plz on the same tag.
create-release = false
# Don't manage/verify the CI workflow. release-plz pushes a per-crate tag for all
# 17 crates in lockstep, but flusso-cli is the only dist-able package; dist's
# default trigger glob would fire the Release workflow on every library tag too
# (building nothing, then failing the empty upload). We hand-narrow the trigger in
# release.yml to the flusso-cli tag, so dist must skip its "release.yml is out of
# date" self-check — that check otherwise rejects the edit at `dist host`.
allow-dirty = ["ci"]
