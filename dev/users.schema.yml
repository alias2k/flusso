# yaml-language-server: $schema=../schemas/index.schema.yml
# The `users` search document: a customer with their profile, addresses, and
# orders (down to line items), plus rollup aggregates over their orders.
#
# Each field is written type-first: `- <type>: <name>`. A change to the user OR
# to any embedded row (profile, address, order, item) rebuilds and re-emits the
# whole document. Setting users.deleted = true emits a tombstone (delete).

version: 1
table: users
primary_key: id

soft_delete:
  column: deleted

fields:
  - integer: id
    required: false
  - keyword: email
    required: true
    transforms: [lowercase, trim]
  - text: fullName # natural-language full text
    column: full_name
    required: false

  # A group: reshape same-row scalar columns into a nested object.
  - object: account
    fields:
      - enum: tier # stored as text, indexed as keyword
        required: true
      - keyword: country
        required: false
      - timestamp: createdAt
        column: created_at
        required: true

  # One-to-one: the user's profile (absent for some users → null object).
  - has_one: profile
    table: profiles
    foreign_key: user_id
    primary_key: user_id
    fields:
      - text: bio
        required: false
      - keyword: avatarUrl
        column: avatar_url
        required: false
      - date: birthDate
        column: birth_date
        required: false

  # One-to-many: every address.
  - has_many: addresses
    table: addresses
    foreign_key: user_id
    primary_key: id
    order_by:
      - { column: id, direction: asc }
    fields:
      - enum: kind
        required: true
      - text: line1
        required: true
      - keyword: city
        required: true
      - keyword: postalCode
        column: postal_code
        required: false
      - keyword: country
        required: false

  # One-to-many: orders (cancelled ones filtered out), newest first, with line
  # items and the product each item refers to — three levels of nesting.
  - has_many: orders
    table: orders
    foreign_key: user_id
    primary_key: id
    filters:
      - { column: status, op: neq, value: cancelled }
    order_by:
      - { column: placed_at, direction: desc }
    fields:
      - enum: status
        required: true
      - decimal: total
        required: true
      - timestamp: placedAt
        column: placed_at
        required: true
      - has_many: items
        table: order_items
        foreign_key: order_id
        primary_key: id
        fields:
          - integer: productId
            column: product_id
            required: true
          - integer: quantity
            required: true
          - decimal: unitPrice
            column: unit_price
            required: true

  # Aggregates over the user's orders.
  - count: orderCount
    table: orders
    foreign_key: user_id
  - sum: lifetimeValue
    table: orders
    column: total
    value_type: decimal
    foreign_key: user_id
  - avg: avgOrderValue
    table: orders
    column: total
    foreign_key: user_id
  - max: lastOrderAt
    table: orders
    column: placed_at
    value_type: timestamp
    foreign_key: user_id
  - count: deliveredOrders
    table: orders
    foreign_key: user_id
    filters:
      - { column: status, op: eq, value: delivered }
