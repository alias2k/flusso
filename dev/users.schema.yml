# The `users` search document: a user with their orders nested in.
#
# A change to a user OR to one of their orders rebuilds and re-emits the whole
# document. Setting users.deleted = true emits a tombstone (delete) instead.

version: 1
table: users
schema: public
primary_key: id

soft_delete:
  column: deleted

fields:
  - field: id
    type: integer
  - field: email
    type: keyword
    required: true
    transforms:
      - lowercase
      - trim
  - field: name
    type: text
  - field: orders
    join:
      table: orders
      type: one_to_many
      primary_key: id
      foreign_key: user_id
      order_by:
        - column: id
          direction: asc
      fields:
        - field: id
          type: integer
        - field: total
          type: decimal
          required: true
        - field: status
          type: keyword
          required: true
