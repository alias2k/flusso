# The `products` search document: a catalog product with its tags (many-to-many),
# its reviews (one-to-many), pricing grouped into a sub-object, and rating
# rollups. A change to the product, a tag link, or a review rebuilds it.

version: 1
table: products
primary_key: id

fields:
  - field: id
    type: integer
  - field: sku
    type: keyword
    required: true
  - field: name
    type: text
    required: true
  - field: description
    kind: prose # text + flusso_text analyzer
  - field: inStock
    column: in_stock
    type: boolean
    required: true
  - field: categoryId
    column: category_id
    type: integer
  - field: createdAt
    column: created_at
    type: timestamp
    required: true
    options:
      format: "strict_date_optional_time||epoch_millis"

  # A group + a custom type: `price` is numeric in Postgres but mapped to an
  # OpenSearch `scaled_float`, with `scaling_factor` passed through via options.
  - group: pricing
    fields:
      - field: amount
        column: price
        type: { custom: { postgres: [numeric], opensearch: scaled_float } }
        options: { scaling_factor: 100 }
        required: true
      - field: currency
        type: keyword
        required: true

  # Many-to-many through the product_tags junction.
  - field: tags
    join:
      table: tags
      type: many_to_many
      through:
        table: product_tags
        left_key: product_id  # junction → this product
        right_key: tag_id     # junction → the tag
      primary_key: id
      order_by:
        - { column: label, direction: asc }
      fields:
        - field: label
          type: keyword
          required: true

  # One-to-many: reviews, newest first.
  - field: reviews
    join:
      table: reviews
      type: one_to_many
      foreign_key: product_id
      primary_key: id
      order_by:
        - { column: created_at, direction: desc }
      fields:
        - field: rating
          type: short
          required: true
        - field: body
          kind: prose
        - field: userId
          column: user_id
          type: integer
        - field: createdAt
          column: created_at
          type: timestamp
          required: true

  # Rating rollups over the reviews.
  - field: reviewCount
    aggregate:
      table: reviews
      op: count
      foreign_key: product_id
  - field: avgRating
    aggregate:
      table: reviews
      op: avg
      column: rating
      foreign_key: product_id
  - field: minRating
    type: short
    aggregate:
      table: reviews
      op: min
      column: rating
      foreign_key: product_id
  - field: maxRating
    type: short
    aggregate:
      table: reviews
      op: max
      column: rating
      foreign_key: product_id
