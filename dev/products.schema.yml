# yaml-language-server: $schema=../libs/2-schema/1-index-yaml/index.schema.yml
# The `products` search document: a catalog product with its tags (many-to-many),
# its reviews (one-to-many), pricing grouped into a sub-object, and rating
# rollups. A change to the product, a tag link, or a review rebuilds it.

version: 1
table: products
primary_key: id

fields:
  - integer: id
    required: false
  - keyword: sku
    required: true
  - text: name
    required: true
  - text: description # natural-language full text
    required: false
  - boolean: inStock
    column: in_stock
    required: true
  - integer: categoryId
    column: category_id
    required: false
  - timestamp: createdAt
    column: created_at
    required: true
    options:
      format: "strict_date_optional_time||epoch_millis"

  # A group + a custom type: `amount` reads the numeric `price` column but is
  # mapped to an OpenSearch `scaled_float`, with `scaling_factor` via options.
  - object: pricing
    fields:
      - custom: amount
        column: price
        postgres: [numeric]
        opensearch: scaled_float
        required: true
        options: { scaling_factor: 100 }
      - keyword: currency
        required: true

  # Many-to-many through the product_tags junction.
  - many_to_many: tags
    table: tags
    through:
      table: product_tags
      left_key: product_id # junction → this product
      right_key: tag_id # junction → the tag
    primary_key: id
    order_by:
      - { column: label, direction: asc }
    fields:
      - keyword: label
        required: true

  # One-to-many: reviews, newest first.
  - has_many: reviews
    table: reviews
    foreign_key: product_id
    primary_key: id
    order_by:
      - { column: created_at, direction: desc }
    fields:
      - short: rating
        required: true
      - text: body
        required: false
      - integer: userId
        column: user_id
        required: false
      - timestamp: createdAt
        column: created_at
        required: true

  # Rating rollups over the reviews.
  - count: reviewCount
    table: reviews
    foreign_key: product_id
  - avg: avgRating
    table: reviews
    column: rating
    foreign_key: product_id
  - min: minRating
    table: reviews
    column: rating
    value_type: short
    foreign_key: product_id
  - max: maxRating
    table: reviews
    column: rating
    value_type: short
    foreign_key: product_id
