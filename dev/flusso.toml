# flusso dev config — points at the docker-compose Postgres and prints rebuilt
# documents to stdout. Run with:
#
#   cargo run -- run --config dev/flusso.toml
#
# Schema paths below are resolved relative to this file's directory.

[source]
type = "postgres"
connection_url = "postgres://postgres:postgres@127.0.0.1:5432/flusso"

[sinks.primary]
type = "opensearch"
url = "http://127.0.0.1:9200"
tls_verify = false
# Index defaults (shown with their defaults). text_analysis = "icu" needs the
# analysis-icu plugin; auto_subfields = false emits text/keyword fields bare.
# number_of_shards = 1
# number_of_replicas = 1
# text_analysis = "builtin"
# auto_subfields = true

[sinks.audit]
type = "stdout"
pretty = true

# Three indexes built from the same store, each a different root table.
[[index]]
name = "users"
schema = "users.schema.yml"
enabled = true

[[index]]
name = "products"
schema = "products.schema.yml"
enabled = true

[[index]]
name = "orders"
schema = "orders.schema.yml"
enabled = true
