# Scrape config for the local dev stack. The only target is flusso itself,
# which runs on the host (`cargo run -- run … --public-address 127.0.0.1:9464`) and
# exposes OpenTelemetry metrics in Prometheus format at /metrics.
global:
  scrape_interval: 5s

# Recording rules deriving the backlog drain rate and time-to-drain ETA from
# the raw slot-lag gauge (see rules/flusso.rules.yml).
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: flusso
    static_configs:
      - targets: ["host.docker.internal:9464"]
