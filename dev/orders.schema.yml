# yaml-language-server: $schema=../libs/2-schema/1-index-yaml/schemas/index.schema.yml
# The `orders` search document: an order with its line items and totals. A
# second root over the same store — a change to the order or any of its items
# rebuilds it. (The customer is referenced by `userId`; flusso joins relate a
# child back to its parent, so a parent-side lookup is kept as a column.)

version: 1
table: orders
primary_key: id

fields:
  - integer: id
    required: false
  - integer: userId
    column: user_id
    required: true
  - enum: status
    required: true
  - decimal: total
    required: true

  # A group: the order's timeline. `shippedAt` is null until the order ships.
  - object: timeline
    fields:
      - timestamp: placedAt
        column: placed_at
        required: true
      - timestamp: shippedAt
        column: shipped_at
        required: false

  # One-to-many: the line items.
  - has_many: items
    table: order_items
    foreign_key: order_id
    primary_key: id
    order_by:
      - { column: id, direction: asc }
    fields:
      - integer: productId
        column: product_id
        required: true
      - integer: quantity
        required: true
      - decimal: unitPrice
        column: unit_price
        required: true

  # Rollups over the line items.
  - count: itemCount
    table: order_items
    foreign_key: order_id
  - sum: unitsSold
    table: order_items
    column: quantity
    value_type: integer # matches the `quantity` column the live check validates against
    foreign_key: order_id
