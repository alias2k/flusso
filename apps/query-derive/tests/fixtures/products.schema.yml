version: 1
table: products
primary_key: id

# A second, minimal index so the FlussoMultiDocument tests have a real
# two-index union to span.
fields:
  - keyword: sku
    required: true
  - text: name
    required: false
  # A `map` field: dynamic-key translations, full-text searchable per key.
  - map: title
    values: text
    required: true
  # A keyword-valued map (exact per-key lookup, no `search`).
  - map: codes
    values: keyword
    required: false
  # A number-valued map: per-currency prices, range-queryable per key.
  - map: prices
    values: double
    required: false
  # A date-valued map: per-region release dates.
  - map: releaseDates
    values: date
    required: false
